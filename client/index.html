<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EV Charging Station Network Management System - Find, reserve, and charge your electric vehicle at stations across İzmir" />
  <title>EV Charge Network — İzmir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/index.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="app" class="app-shell">

    <nav id="main-nav" class="glass-nav">
      <div class="nav-brand" id="app-brand" title="Switch portal">
        <i class="ph-fill ph-lightning" style="color: var(--green);"></i>
        <span>EV Charge</span>
      </div>

      <div class="nav-links" id="driver-nav-links">
        <a href="#/map" class="nav-link" data-route="map">
          <span class="nav-icon"><i class="ph ph-map-trifold"></i></span>
          <span>Map</span>
        </a>
        <a href="#/vehicles" class="nav-link" data-route="vehicles">
          <span class="nav-icon"><i class="ph ph-car-profile"></i></span>
          <span>Vehicles</span>
        </a>
        <a href="#/reservations" class="nav-link" data-route="reservations">
          <span class="nav-icon"><i class="ph ph-calendar-blank"></i></span>
          <span>Reservations</span>
        </a>
        <a href="#/session" class="nav-link" data-route="session">
          <span class="nav-icon"><i class="ph ph-battery-charging"></i></span>
          <span>Charging</span>
        </a>
        <a href="#/history" class="nav-link" data-route="history">
          <span class="nav-icon"><i class="ph ph-clock-counter-clockwise"></i></span>
          <span>History</span>
        </a>
      </div>

      <div class="nav-links hidden" id="admin-nav-links">
        <a href="#/admin/dashboard" class="nav-link admin-nav" data-route="admin/dashboard">
          <span class="nav-icon"><i class="ph ph-chart-pie-slice"></i></span>
          <span>Analytics</span>
        </a>
        <a href="#/admin/marketing" class="nav-link admin-nav" data-route="admin/marketing">
          <span class="nav-icon"><i class="ph ph-trend-up"></i></span>
          <span>Marketing</span>
        </a>
        <a href="#/admin/issues" class="nav-link admin-nav" data-route="admin/issues">
          <span class="nav-icon"><i class="ph ph-wrench"></i></span>
          <span>Issues</span>
        </a>
        <a href="#/admin/stations" class="nav-link admin-nav" data-route="admin/stations">
          <span class="nav-icon"><i class="ph ph-plug-charging"></i></span>
          <span>Fleet</span>
        </a>
      </div>

      <div class="nav-wallet" id="nav-wallet">
        <i class="ph ph-wallet"></i>
        <span class="wallet-balance" id="wallet-balance">₺0.00</span>
      </div>
    </nav>

    <main id="main-content" class="main-content">
    </main>

    <div id="toast-container" class="toast-container"></div>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-content" class="modal-content">
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
